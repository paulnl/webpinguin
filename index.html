<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPinguin - Websites en meer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1A4F91 0%, #00C4CC 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        h1 span {
            color: #00C4CC;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.9;
        }
        .coming-soon {
            margin-top: 40px;
            padding: 20px 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="logo">🐧</div>
    <h1>web<span>pinguin</span></h1>
    <p>WEBSITES EN MEER</p>
    <div class="coming-soon">
        <h2>🚧 Coming Soon</h2>
        <p>Deze pagina is binnenkort live!</p>
    </div>
</body>
</html>

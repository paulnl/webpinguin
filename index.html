<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPinguin - Websites en meer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1A4F91 0%, #00C4CC 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .logo {
            width: 300px;
            max-width: 80vw;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        h1 span {
            color: #00C4CC;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.9;
        }
        .slogan {
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: #666;
            margin-bottom: 40px;
        }
        .coming-soon {
            margin-top: 40px;
            padding: 30px 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .coming-soon h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <img src="images/logo-webpinguin.png" alt="WebPinguin" class="logo">
    <p class="slogan">WEBSITES EN MEER</p>
    <div class="coming-soon">
        <h2>🚧 Binnenkort Live</h2>
        <p>Deze pagina is binnenkort live!</p>
    </div>
</body>
</html>
